<!-- ==================== HERO ==================== -->

    <div class="hero-geometry circle-3"></div>
    <div class="container text-center position-relative" style="z-index:2;">

            Contact <span style="background: linear-gradient(135deg, #1a73e8 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Me</span>

        <p class="fs-5" style="color: #6b8299;">期待与您的交流与合作</p>
    </div>
</section>

<!-- ==================== MAIN CONTENT ==================== -->
<section class="section section-alt">
    <div class="container">
        <div class="row g-5">
            <!-- Contact Information -->
            <div class="col-lg-5">
                <div class="contact-info-card">
                    <h3 class="fw-bold mb-4" style="font-family: var(--font-cn);">
                        <i class="bi bi-chat-dots-fill text-primary me-2"></i>联系方式
                    </h3>
                    <p class="text-muted mb-4" style="font-family: var(--font-cn);">
                        如果您对我的简历感兴趣，或者想了解更多关于我的信息，欢迎通过以下方式与我联系。
                    </p>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="bi bi-geo-alt-fill"></i></div>
                        <div>
                            <h5>地址</h5>
                            <p>云南省昆明市 · 昆明学院信息工程学院</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="bi bi-envelope-fill"></i></div>
                        <div>
                            <h5>邮箱</h5>
                            <a href="mailto:dengjun@example.com">dengjun@example.com</a>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="bi bi-telephone-fill"></i></div>
                        <div>
                            <h5>电话</h5>
                            <p>请通过邮件联系获取</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="bi bi-github"></i></div>
                        <div>
                            <h5>GitHub</h5>
                            <a href="https://github.com/dengjun040814-dj" target="_blank" rel="noopener">
                                github.com/dengjun040814-dj
                            </a>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="bi bi-globe2"></i></div>
                        <div>
                            <h5>个人主页</h5>
                            <a href="https://dengjun040814-dj.github.io/Personal-Resume/" target="_blank" rel="noopener">
                                dengjun040814-dj.github.io
                            </a>
                        </div>
                    </div>

                    <!-- Social Links -->
                    <hr class="my-4">
                    <h5 class="fw-bold mb-3" style="font-family: var(--font-cn);">社交媒体</h5>
                    <div class="d-flex gap-3">
                        <a href="https://github.com/dengjun040814-dj" target="_blank" rel="noopener"
                           class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center"
                           style="width:46px;height:46px;" title="GitHub">
                            <i class="bi bi-github fs-5"></i>
                        </a>
                        <a href="mailto:dengjun@example.com"
                           class="btn btn-outline-danger rounded-circle d-flex align-items-center justify-content-center"
                           style="width:46px;height:46px;" title="Email">
                            <i class="bi bi-envelope-fill fs-5"></i>
                        </a>
                        <a href="../index.html"
                           class="btn btn-outline-primary rounded-circle d-flex align-items-center justify-content-center"
                           style="width:46px;height:46px;" title="Home">
                            <i class="bi bi-house-fill fs-5"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="col-lg-7">
                <div class="contact-info-card">
                    <h3 class="fw-bold mb-4" style="font-family: var(--font-cn);">
                        <i class="bi bi-send-fill text-primary me-2"></i>发送消息
                    </h3>
                    <form id="contactForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-semibold">姓名 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control" id="name" placeholder="请输入您的姓名" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-semibold">邮箱 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope-fill"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="subject" class="form-label fw-semibold">主题</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-pencil-fill"></i></span>
                                    <input type="text" class="form-control" id="subject" placeholder="消息主题">
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="message" class="form-label fw-semibold">消息 <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="message" rows="6" placeholder="请输入您想说的话..." required></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-hero-primary">
                                    <i class="bi bi-send-fill me-2"></i>发送消息
                                </button>
                                <button type="reset" class="btn btn-outline-secondary ms-2 rounded-pill px-4">
                                    <i class="bi bi-arrow-repeat me-2"></i>重置
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Form handling -->
<script>
(function() {
    'use strict';

    // Navbar scroll effect
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }, { passive: true });

    // Contact form
    const contactForm = document.getElementById('contactForm');
    if (contactForm) {
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name || !email || !message) {
                alert('请填写所有必填字段（姓名、邮箱、消息）！');
                return;
            }

            alert('感谢您的消息，' + name + '！\n\n我会尽快回复您的邮件（' + email + '）。\n\n(演示模式 — 消息未实际发送)');
            contactForm.reset();
        });
    }
})();
</script>

</body>
